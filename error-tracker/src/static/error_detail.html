<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Detail - Error Tracker</title>
  <link rel="stylesheet" href="/tailwind.css">
  <script defer src="/alpine.js"></script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .traceback-text { white-space: pre-wrap; word-break: break-word; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="errorDetail()" x-init="init()" x-cloak>
  <div class="max-w-5xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    <a href="/" class="text-blue-400 hover:text-blue-300 text-sm mb-4 inline-block">&larr; Back to errors</a>

    <!-- Loading state -->
    <div x-show="loading" class="text-gray-500 text-sm">Loading...</div>

    <!-- Not found / error state -->
    <div x-show="!loading && !err" class="text-center py-12 text-red-400">Error not found</div>

    <!-- Error header -->
    <template x-if="err">
      <div>
        <div class="mb-6">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 sm:gap-4">
            <div class="min-w-0 flex-1">
              <h1 class="text-lg sm:text-xl font-bold text-red-400 break-words" x-text="err.exception_type"></h1>
              <p class="text-gray-300 mt-1 break-words" x-text="err.message"></p>
              <div class="flex flex-wrap items-center gap-2 sm:gap-3 mt-3 text-xs sm:text-sm">
                <span class="inline-block bg-blue-900/40 text-blue-300 text-xs px-2 py-0.5 rounded" x-text="err.project"></span>
                <span class="inline-block text-xs px-2 py-0.5 rounded"
                      :class="err.resolved ? 'bg-green-900/40 text-green-300' : 'bg-red-900/40 text-red-300'"
                      x-text="err.resolved ? 'Resolved' : 'Unresolved'"></span>
                <span class="text-gray-500">|</span>
                <span class="text-gray-400" x-text="err.count + ' occurrence' + (err.count !== 1 ? 's' : '')"></span>
                <span class="text-gray-500">|</span>
                <span class="text-gray-400" :title="formatDate(err.first_seen)" x-text="'First: ' + timeAgo(err.first_seen)"></span>
                <span class="text-gray-400" :title="formatDate(err.last_seen)" x-text="'Last: ' + timeAgo(err.last_seen)"></span>
                <span x-show="err.resolved && err.resolved_at" class="text-gray-400"
                      :title="formatDate(err.resolved_at)" x-text="'Resolved: ' + timeAgo(err.resolved_at)"></span>
              </div>
            </div>
            <div>
              <button x-show="!err.resolved" @click="resolveError()" :disabled="resolving"
                      class="px-4 py-1.5 rounded text-sm bg-green-700 hover:bg-green-600 disabled:bg-gray-700 disabled:text-gray-400 text-white transition-colors"
                      x-text="resolving ? 'Resolving...' : 'Mark as Resolved'"></button>
              <span x-show="err.resolved" class="px-4 py-1.5 rounded text-sm bg-gray-700 text-gray-400">Resolved</span>
            </div>
          </div>
        </div>

        <!-- Traceback -->
        <div x-show="err.traceback" class="mb-8">
          <h2 class="text-sm uppercase tracking-wider text-gray-400 mb-2">Traceback</h2>
          <div class="bg-gray-950 border border-gray-700 rounded-lg p-4 overflow-x-auto">
            <pre class="traceback-text text-sm text-red-300" x-text="err.traceback"></pre>
          </div>
        </div>

        <!-- Occurrences -->
        <div x-show="(err.occurrences || []).length > 0">
          <h2 class="text-sm uppercase tracking-wider text-gray-400 mb-2">Recent Occurrences</h2>
          <div class="space-y-3">
            <template x-for="(occ, idx) in (err.occurrences || [])" :key="idx">
              <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                <div class="flex flex-wrap items-center gap-3 text-sm mb-3">
                  <span class="text-gray-400" :title="formatDate(occ.timestamp)" x-text="formatDate(occ.timestamp)"></span>
                  <span x-show="occ.request_method" class="font-medium" :class="methodColor(occ.request_method)" x-text="occ.request_method"></span>
                  <span x-show="occ.request_url" class="text-gray-300" x-text="occ.request_url"></span>
                  <template x-if="occ.user_id">
                    <div class="contents">
                      <span class="text-gray-500">|</span>
                      <span class="text-purple-300" x-text="'user: ' + occ.user_id"></span>
                    </div>
                  </template>
                </div>

                <!-- Browser context -->
                <template x-if="occ.request_method === 'BROWSER' && occ.extra">
                  <div x-data="{ ctx: parseExtra(occ.extra) }">
                    <div x-show="ctx" class="flex flex-wrap items-center gap-3 text-xs mb-3 bg-purple-900/20 border border-purple-800/30 rounded px-3 py-2">
                      <span x-show="ctx && ctx.page_url" class="text-cyan-300" title="Page URL" x-text="ctx && ctx.page_url"></span>
                      <span x-show="ctx && ctx.user_agent" class="text-gray-400" title="User Agent" x-text="ctx && ctx.user_agent"></span>
                      <a x-show="ctx && ctx.session_id"
                         :href="'/?session_id=' + encodeURIComponent(ctx && ctx.session_id || '')"
                         class="text-amber-300 hover:text-amber-200 underline decoration-dotted"
                         title="View all errors from this session"
                         x-text="'session: ' + (ctx && ctx.session_id || '')"></a>
                    </div>
                  </div>
                </template>

                <details x-show="occ.traceback" class="mb-2">
                  <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-300">Traceback</summary>
                  <pre class="traceback-text text-xs text-red-300 mt-2 bg-gray-950 rounded p-3 overflow-x-auto" x-text="occ.traceback"></pre>
                </details>
                <details x-show="occ.request_headers" class="mb-2">
                  <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-300">Request Headers</summary>
                  <pre class="text-xs text-gray-300 mt-2 bg-gray-950 rounded p-3 overflow-x-auto" x-text="prettyJson(occ.request_headers)"></pre>
                </details>
                <details x-show="occ.extra">
                  <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-300">Extra Context</summary>
                  <pre class="text-xs text-gray-300 mt-2 bg-gray-950 rounded p-3 overflow-x-auto" x-text="prettyJson(occ.extra)"></pre>
                </details>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- API Key Modal -->
    <div x-show="showApiKeyModalFlag" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-sm">
        <h2 class="text-lg font-bold text-white mb-2">API Key Required</h2>
        <p class="text-gray-400 text-sm mb-4">Enter your API key to access the Error Tracker.</p>
        <input x-model="apiKeyInput" type="password" placeholder="your-api-key"
          @keydown.enter="submitApiKey()" x-ref="apiKeyInputEl"
          class="w-full bg-gray-900 border border-gray-600 text-gray-200 text-sm rounded px-3 py-2 mb-4 focus:outline-none focus:border-blue-500">
        <button @click="submitApiKey()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded px-4 py-2 transition-colors">Connect</button>
      </div>
    </div>
  </div>

  <script>
    function errorDetail() {
      return {
        apiKey: localStorage.getItem('api_key') || '',
        apiKeyInput: '',
        showApiKeyModalFlag: false,

        errorId: window.location.pathname.split('/').pop(),
        err: null,
        loading: true,
        resolving: false,

        init() {
          if (!this.apiKey) {
            this.openApiKeyModal();
          } else {
            this.loadError();
          }
        },

        headers() {
          const h = { 'Content-Type': 'application/json' };
          if (this.apiKey) h['X-API-Key'] = this.apiKey;
          return h;
        },

        formatDate(iso) {
          if (!iso) return '';
          const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
          return d.toLocaleString();
        },

        timeAgo(iso) {
          if (!iso) return '';
          const now = Date.now();
          const then = new Date(iso.endsWith('Z') ? iso : iso + 'Z').getTime();
          const diff = Math.floor((now - then) / 1000);
          if (diff < 60) return diff + 's ago';
          if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
          if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
          return Math.floor(diff / 86400) + 'd ago';
        },

        methodColor(m) {
          switch (m) {
            case 'GET': return 'text-green-400';
            case 'POST': return 'text-blue-400';
            case 'PUT': case 'PATCH': return 'text-yellow-400';
            case 'DELETE': return 'text-red-400';
            case 'BROWSER': return 'text-purple-400';
            default: return 'text-gray-400';
          }
        },

        parseExtra(extra) {
          if (!extra) return null;
          if (typeof extra === 'string') {
            try { return JSON.parse(extra); } catch { return null; }
          }
          return extra;
        },

        prettyJson(value) {
          if (!value) return '';
          if (typeof value === 'string') return value;
          try { return JSON.stringify(value, null, 2); } catch { return String(value); }
        },

        async loadError() {
          this.loading = true;
          try {
            const res = await fetch(`/api/errors/${this.errorId}`, { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            if (!res.ok) {
              this.err = null;
              return;
            }
            const data = await res.json();
            this.err = data;
            document.title = `${data.exception_type}: ${data.message} - Error Tracker`;
          } catch (e) {
            console.error('Failed to load error:', e);
            this.err = null;
          } finally {
            this.loading = false;
          }
        },

        async resolveError() {
          if (!this.err || this.resolving) return;
          this.resolving = true;
          try {
            const res = await fetch(`/api/errors/${this.errorId}/resolve`, {
              method: 'POST',
              headers: this.headers(),
            });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            if (res.ok) {
              this.err.resolved = true;
              this.err.resolved_at = new Date().toISOString();
            }
          } catch (e) {
            console.error('Failed to resolve:', e);
          } finally {
            this.resolving = false;
          }
        },

        openApiKeyModal() {
          this.showApiKeyModalFlag = true;
          this.$nextTick(() => this.$refs.apiKeyInputEl?.focus());
        },

        submitApiKey() {
          const key = (this.apiKeyInput || '').trim();
          if (!key) return;
          this.apiKey = key;
          localStorage.setItem('api_key', key);
          this.showApiKeyModalFlag = false;
          this.loadError();
        },
      };
    }
  </script>
</body>
</html>
