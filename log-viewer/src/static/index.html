<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Viewer</title>
  <link rel="stylesheet" href="/tailwind.css">
  <style>
    body { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .log-message { white-space: pre-wrap; word-break: break-word; }
    .log-expanded { max-height: none !important; }
    .log-collapsed { max-height: 1.5em; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    <header class="mb-4 sm:mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white">Log Viewer</h1>
        <p class="text-gray-400 text-xs sm:text-sm mt-1">Browse and search application logs</p>
      </div>
      <div id="stats-bar" class="text-xs text-gray-500"></div>
    </header>

    <!-- Filters -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:flex-wrap gap-3 sm:gap-4 mb-4 lg:items-end">
      <div class="sm:col-span-2 lg:flex-1 lg:min-w-[200px]">
        <label class="block text-xs text-gray-400 mb-1">Search</label>
        <input type="text" id="filter-search" placeholder="Full-text search..."
          class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Container</label>
        <select id="filter-container" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All containers</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Level</label>
        <select id="filter-level" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All levels</option>
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
          <option value="CRITICAL">CRITICAL</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Time range</label>
        <select id="filter-time" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All time</option>
          <option value="1h">Last 1 hour</option>
          <option value="24h">Last 24 hours</option>
          <option value="7d">Last 7 days</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Auto-refresh</label>
        <select id="filter-refresh" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="0">Off</option>
          <option value="5">Every 5s</option>
          <option value="30">Every 30s</option>
          <option value="60">Every 1m</option>
          <option value="300">Every 5m</option>
        </select>
      </div>
      <div class="flex gap-2 lg:items-end">
        <button id="btn-tail" class="flex-1 lg:flex-initial w-full lg:w-auto px-3 py-1.5 rounded text-sm font-medium bg-gray-800 border border-gray-700 hover:bg-gray-700 transition-colors">
          Live Tail
        </button>
        <span id="refresh-indicator" class="hidden self-center text-green-400 text-xs whitespace-nowrap">&#9679; live</span>
      </div>
    </div>

    <!-- Live tail indicator -->
    <div id="tail-indicator" class="hidden mb-4 flex items-center gap-2 text-sm">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
      </span>
      <span class="text-green-400">Live tail active</span>
      <span id="tail-count" class="text-gray-500 ml-2"></span>
    </div>

    <!-- Log entries -->
    <div class="rounded-lg border border-gray-700 overflow-hidden">
      <div id="log-list" class="divide-y divide-gray-800 max-h-[70vh] overflow-y-auto">
        <div class="px-4 py-8 text-center text-gray-500">Loading...</div>
      </div>
    </div>

    <!-- API Key Modal -->
    <div id="api-key-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-sm">
        <h2 class="text-lg font-bold text-white mb-2">API Key Required</h2>
        <p class="text-gray-400 text-sm mb-4">Enter your API key to access the Log Viewer.</p>
        <input id="api-key-input" type="password" placeholder="your-api-key"
          class="w-full bg-gray-900 border border-gray-600 text-gray-200 text-sm rounded px-3 py-2 mb-4 focus:outline-none focus:border-blue-500">
        <button id="api-key-submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded px-4 py-2 transition-colors">Connect</button>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mt-4 text-sm text-gray-400">
      <span id="pagination-info"></span>
      <div class="flex gap-2">
        <button id="btn-prev" class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed" disabled>Prev</button>
        <button id="btn-next" class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed" disabled>Next</button>
      </div>
    </div>
  </div>

  <script>
    let API_KEY = localStorage.getItem('api_key') || '';
    let currentOffset = 0;
    const LIMIT = 100;
    let eventSource = null;
    let tailActive = false;
    let tailCount = 0;
    let suppressUrlSync = false;
    let autoRefreshTimer = null;

    function headers() {
      const h = { 'Content-Type': 'application/json' };
      if (API_KEY) h['X-API-Key'] = API_KEY;
      return h;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatTimestamp(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleString();
      } catch (e) {
        return iso;
      }
    }

    function levelColor(level) {
      switch ((level || '').toUpperCase()) {
        case 'DEBUG': return 'text-gray-500';
        case 'INFO': return 'text-blue-400';
        case 'WARNING': case 'WARN': return 'text-yellow-400';
        case 'ERROR': return 'text-red-400';
        case 'CRITICAL': case 'FATAL': return 'text-red-500 font-bold';
        default: return 'text-gray-300';
      }
    }

    function levelBg(level) {
      switch ((level || '').toUpperCase()) {
        case 'DEBUG': return 'bg-gray-800';
        case 'INFO': return 'bg-gray-900';
        case 'WARNING': case 'WARN': return 'bg-yellow-900/10';
        case 'ERROR': return 'bg-red-900/10';
        case 'CRITICAL': case 'FATAL': return 'bg-red-900/20';
        default: return 'bg-gray-900';
      }
    }

    function levelBadge(level) {
      switch ((level || '').toUpperCase()) {
        case 'DEBUG': return 'bg-gray-700 text-gray-400';
        case 'INFO': return 'bg-blue-900/40 text-blue-300';
        case 'WARNING': case 'WARN': return 'bg-yellow-900/40 text-yellow-300';
        case 'ERROR': return 'bg-red-900/40 text-red-300';
        case 'CRITICAL': case 'FATAL': return 'bg-red-900/60 text-red-200';
        default: return 'bg-gray-700 text-gray-400';
      }
    }

    function renderLogEntry(entry) {
      return `
        <div class="px-3 sm:px-4 py-2 hover:bg-gray-800/50 cursor-pointer transition-colors ${levelBg(entry.level)} log-row" onclick="toggleExpand(this)">
          <div class="flex flex-col sm:flex-row sm:items-start sm:gap-3">
            <div class="flex items-center gap-2 sm:gap-3 mb-1 sm:mb-0">
              <span class="text-xs text-gray-500 whitespace-nowrap sm:mt-0.5 sm:w-[140px] sm:flex-shrink-0">${esc(formatTimestamp(entry.timestamp))}</span>
              <span class="inline-block ${levelBadge(entry.level)} text-xs px-1.5 py-0.5 rounded sm:w-[60px] text-center sm:flex-shrink-0">${esc(entry.level)}</span>
              <span class="text-xs text-purple-400 sm:w-[100px] sm:flex-shrink-0 truncate sm:mt-0.5">${esc(entry.container)}</span>
            </div>
            <span class="log-message log-collapsed ${levelColor(entry.level)} text-sm flex-1 break-words">${esc(entry.message)}</span>
          </div>
          <div class="log-detail hidden mt-2 sm:ml-[310px] text-xs text-gray-500 border-t border-gray-800 pt-2">
            <div><strong>ID:</strong> ${entry.id}</div>
            <div><strong>Stream:</strong> ${esc(entry.stream)}</div>
            <div><strong>Container:</strong> ${esc(entry.container)}</div>
            <div><strong>Timestamp:</strong> ${esc(entry.timestamp)}</div>
            <div class="mt-2"><strong>Full message:</strong></div>
            <pre class="mt-1 text-gray-400 whitespace-pre-wrap bg-gray-800 rounded p-2 max-h-[400px] overflow-auto">${esc(entry.message)}</pre>
          </div>
        </div>`;
    }

    function toggleExpand(el) {
      const msg = el.querySelector('.log-message');
      const detail = el.querySelector('.log-detail');
      if (msg.classList.contains('log-collapsed')) {
        msg.classList.remove('log-collapsed');
        msg.classList.add('log-expanded');
        detail.classList.remove('hidden');
      } else {
        msg.classList.add('log-collapsed');
        msg.classList.remove('log-expanded');
        detail.classList.add('hidden');
      }
    }

    function getSinceTimestamp() {
      const range = document.getElementById('filter-time').value;
      if (!range) return null;
      const now = new Date();
      switch (range) {
        case '1h': now.setHours(now.getHours() - 1); break;
        case '24h': now.setDate(now.getDate() - 1); break;
        case '7d': now.setDate(now.getDate() - 7); break;
        default: return null;
      }
      return now.toISOString();
    }

    // ─── URL state sync ───────────────────────────────────────────────────
    function readUrlState() {
      const params = new URLSearchParams(window.location.search);
      suppressUrlSync = true;
      const search = params.get('search') || '';
      const container = params.get('container') || '';
      const level = params.get('level') || '';
      const time = params.get('time') || '';
      const refresh = params.get('refresh') || '0';
      const offset = parseInt(params.get('offset') || '0', 10);
      document.getElementById('filter-search').value = search;
      // container select is populated later — store the desired value
      document.getElementById('filter-container').dataset.pending = container;
      document.getElementById('filter-level').value = level;
      document.getElementById('filter-time').value = time;
      document.getElementById('filter-refresh').value = refresh;
      currentOffset = isNaN(offset) ? 0 : offset;
      suppressUrlSync = false;
    }

    function writeUrlState() {
      if (suppressUrlSync) return;
      const params = new URLSearchParams();
      const search = document.getElementById('filter-search').value.trim();
      const container = document.getElementById('filter-container').value;
      const level = document.getElementById('filter-level').value;
      const time = document.getElementById('filter-time').value;
      const refresh = document.getElementById('filter-refresh').value;
      if (search) params.set('search', search);
      if (container) params.set('container', container);
      if (level) params.set('level', level);
      if (time) params.set('time', time);
      if (refresh && refresh !== '0') params.set('refresh', refresh);
      if (currentOffset > 0) params.set('offset', String(currentOffset));
      const qs = params.toString();
      const url = window.location.pathname + (qs ? '?' + qs : '');
      window.history.replaceState({}, '', url);
    }

    function setAutoRefresh() {
      const seconds = parseInt(document.getElementById('filter-refresh').value, 10);
      const indicator = document.getElementById('refresh-indicator');
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
      // Auto-refresh is meaningless during live tail — tailing already
      // streams new entries continuously.
      if (seconds > 0 && !tailActive) {
        autoRefreshTimer = setInterval(loadLogs, seconds * 1000);
        indicator.classList.remove('hidden');
      } else {
        indicator.classList.add('hidden');
      }
      writeUrlState();
    }

    async function loadContainers() {
      try {
        const res = await fetch('/api/containers', { headers: headers() });
        if (res.status === 401) { showApiKeyModal(); return; }
        const data = await res.json();
        const sel = document.getElementById('filter-container');
        (data.containers || []).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.name;
          opt.textContent = c.name + ' (' + c.log_count + ')';
          sel.appendChild(opt);
        });
        // Restore pending selection from URL
        const pending = sel.dataset.pending;
        if (pending) {
          sel.value = pending;
          delete sel.dataset.pending;
        }
      } catch (e) {
        console.error('Failed to load containers:', e);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats', { headers: headers() });
        if (res.status === 401) { showApiKeyModal(); return; }
        const data = await res.json();
        document.getElementById('stats-bar').textContent =
          `${data.total_logs.toLocaleString()} logs indexed`;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    async function loadLogs() {
      const container = document.getElementById('filter-container').value;
      const level = document.getElementById('filter-level').value;
      const search = document.getElementById('filter-search').value.trim();
      const since = getSinceTimestamp();

      const params = new URLSearchParams();
      if (container) params.set('container', container);
      if (level) params.set('level', level);
      if (search) params.set('search', search);
      if (since) params.set('since', since);
      params.set('limit', LIMIT);
      params.set('offset', currentOffset);

      writeUrlState();

      const logList = document.getElementById('log-list');

      try {
        const res = await fetch('/api/logs?' + params.toString(), { headers: headers() });
        if (res.status === 401) { showApiKeyModal(); return; }
        const data = await res.json();

        if (!data.logs || data.logs.length === 0) {
          logList.innerHTML = '<div class="px-4 py-8 text-center text-gray-500">No logs found</div>';
          updatePagination(0, 0);
          return;
        }

        logList.innerHTML = data.logs.map(renderLogEntry).join('');
        updatePagination(data.total, data.offset);
      } catch (e) {
        logList.innerHTML = '<div class="px-4 py-8 text-center text-red-400">Failed to load logs</div>';
        console.error('Failed to load logs:', e);
      }
    }

    function updatePagination(total, offset) {
      const info = document.getElementById('pagination-info');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      if (total === 0) {
        info.textContent = 'No logs';
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
      }

      const start = offset + 1;
      const end = Math.min(offset + LIMIT, total);
      info.textContent = `Showing ${start}-${end} of ${total.toLocaleString()}`;

      btnPrev.disabled = offset === 0;
      btnNext.disabled = offset + LIMIT >= total;
    }

    // Live tail
    function startTail() {
      if (tailActive) return;

      const container = document.getElementById('filter-container').value;
      const level = document.getElementById('filter-level').value;

      const params = new URLSearchParams();
      if (container) params.set('container', container);
      if (level) params.set('level', level);
      if (API_KEY) params.set('api_key', API_KEY);

      const url = '/api/logs/tail' + (params.toString() ? '?' + params.toString() : '');
      eventSource = new EventSource(url);
      tailActive = true;
      tailCount = 0;
      // Suspend any periodic refresh while tailing
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
      document.getElementById('refresh-indicator').classList.add('hidden');

      document.getElementById('btn-tail').textContent = 'Stop Tail';
      document.getElementById('btn-tail').classList.add('bg-green-900', 'border-green-700', 'text-green-300');
      document.getElementById('btn-tail').classList.remove('bg-gray-800', 'border-gray-700');
      document.getElementById('tail-indicator').classList.remove('hidden');
      document.getElementById('pagination').classList.add('hidden');

      // Clear current log list for tail mode
      document.getElementById('log-list').innerHTML = '';

      eventSource.addEventListener('log', function(e) {
        try {
          const entry = JSON.parse(e.data);
          const logList = document.getElementById('log-list');
          logList.insertAdjacentHTML('afterbegin', renderLogEntry(entry));

          // Keep max 500 entries in DOM during tail
          while (logList.children.length > 500) {
            logList.removeChild(logList.lastChild);
          }

          tailCount++;
          document.getElementById('tail-count').textContent = tailCount + ' new entries';
        } catch (err) {
          console.error('Failed to parse SSE log event:', err);
        }
      });

      eventSource.addEventListener('heartbeat', function() {
        // Connection is alive
      });

      eventSource.addEventListener('close', function() {
        stopTail();
      });

      eventSource.onerror = function() {
        stopTail();
      };
    }

    function stopTail() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      tailActive = false;

      document.getElementById('btn-tail').textContent = 'Live Tail';
      document.getElementById('btn-tail').classList.remove('bg-green-900', 'border-green-700', 'text-green-300');
      document.getElementById('btn-tail').classList.add('bg-gray-800', 'border-gray-700');
      document.getElementById('tail-indicator').classList.add('hidden');
      document.getElementById('pagination').classList.remove('hidden');

      // Reload logs to show current state
      currentOffset = 0;
      loadLogs();
      // Resume periodic refresh if configured
      setAutoRefresh();
    }

    // Event listeners
    document.getElementById('btn-tail').addEventListener('click', () => {
      if (tailActive) {
        stopTail();
      } else {
        startTail();
      }
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      currentOffset = Math.max(0, currentOffset - LIMIT);
      loadLogs();
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      currentOffset += LIMIT;
      loadLogs();
    });

    // Debounce search input
    let searchTimer = null;
    document.getElementById('filter-search').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { currentOffset = 0; loadLogs(); }, 300);
    });

    document.getElementById('filter-container').addEventListener('change', () => { currentOffset = 0; loadLogs(); });
    document.getElementById('filter-level').addEventListener('change', () => { currentOffset = 0; loadLogs(); });
    document.getElementById('filter-time').addEventListener('change', () => { currentOffset = 0; loadLogs(); });
    document.getElementById('filter-refresh').addEventListener('change', setAutoRefresh);

    // React to back/forward navigation
    window.addEventListener('popstate', () => {
      readUrlState();
      setAutoRefresh();
      loadLogs();
    });

    function showApiKeyModal() {
      document.getElementById('api-key-modal').classList.remove('hidden');
      document.getElementById('api-key-input').focus();
    }

    function handleApiKeySubmit() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return;
      API_KEY = key;
      localStorage.setItem('api_key', key);
      document.getElementById('api-key-modal').classList.add('hidden');
      loadContainers().then(loadLogs);
      loadStats();
    }

    document.getElementById('api-key-submit').addEventListener('click', handleApiKeySubmit);
    document.getElementById('api-key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleApiKeySubmit();
    });

    // Initial load — read URL state, then fetch
    readUrlState();
    setAutoRefresh();
    if (!API_KEY) {
      showApiKeyModal();
    } else {
      loadContainers().then(loadLogs);
      loadStats();
    }
  </script>
</body>
</html>
