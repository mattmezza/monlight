<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Tracker</title>
  <link rel="stylesheet" href="/tailwind.css">
  <script defer src="/alpine.js"></script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="errorTracker()" x-init="init()" x-cloak>
  <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    <header class="mb-4 sm:mb-6 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white">Error Tracker</h1>
        <p class="text-gray-400 text-xs sm:text-sm mt-1">Monitor and manage application errors</p>
      </div>
      <div class="flex items-center gap-2">
        <select x-model="refresh" class="bg-gray-800 border border-gray-700 text-gray-200 text-xs sm:text-sm rounded px-2 sm:px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="0">Auto-refresh: off</option>
          <option value="5">Every 5s</option>
          <option value="30">Every 30s</option>
          <option value="60">Every 1m</option>
          <option value="300">Every 5m</option>
        </select>
        <span x-show="refresh !== '0'" class="text-green-400 text-xs">&#9679; live</span>
      </div>
    </header>

    <!-- Session ID filter banner -->
    <div x-show="sessionId" class="mb-4 bg-amber-900/30 border border-amber-700/40 text-amber-300 text-sm rounded px-3 sm:px-4 py-2 flex flex-wrap items-center justify-between gap-2">
      <span>Showing errors from session: <strong class="break-all" x-text="sessionId"></strong></span>
      <button @click="clearSession()" class="text-amber-400 hover:text-amber-200 text-xs underline">Clear filter</button>
    </div>

    <!-- Filters -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:flex-wrap gap-3 sm:gap-4 mb-4 sm:mb-6 lg:items-end">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Project</label>
        <select x-model="project" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All projects</option>
          <template x-for="p in projects" :key="p">
            <option :value="p" x-text="p"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Source</label>
        <select x-model="source" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All sources</option>
          <option value="server">Server</option>
          <option value="browser">Browser</option>
        </select>
      </div>
      <div class="flex items-center gap-2 sm:col-span-2 lg:col-span-1 lg:pb-1">
        <input type="checkbox" id="filter-resolved" x-model="resolved" class="rounded bg-gray-800 border-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-gray-900">
        <label for="filter-resolved" class="text-xs text-gray-400">Show resolved</label>
      </div>
    </div>

    <!-- Error Table (desktop) -->
    <div class="hidden md:block overflow-x-auto rounded-lg border border-gray-700">
      <table class="w-full text-sm">
        <thead class="bg-gray-800 text-gray-400 text-xs uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">Exception</th>
            <th class="px-4 py-3 text-left">Message</th>
            <th class="px-4 py-3 text-left">Project</th>
            <th class="px-4 py-3 text-right">Count</th>
            <th class="px-4 py-3 text-left">First Seen</th>
            <th class="px-4 py-3 text-left">Last Seen</th>
            <th class="px-4 py-3 text-left">Source</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
          <template x-if="loading">
            <tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">Loading...</td></tr>
          </template>
          <template x-if="!loading && errors.length === 0">
            <tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">No errors found</td></tr>
          </template>
          <template x-for="err in errors" :key="err.id">
            <tr class="hover:bg-gray-800/50 cursor-pointer transition-colors" @click="window.location='/errors/' + err.id">
              <td class="px-4 py-3"><span class="text-red-400 font-medium" x-text="err.exception_type"></span></td>
              <td class="px-4 py-3 text-gray-300 max-w-xs truncate" x-text="truncate(err.message, 80)"></td>
              <td class="px-4 py-3">
                <span class="inline-block bg-blue-900/40 text-blue-300 text-xs px-2 py-0.5 rounded" x-text="err.project"></span>
              </td>
              <td class="px-4 py-3 text-right font-medium" :class="countClass(err.count)" x-text="err.count"></td>
              <td class="px-4 py-3 text-gray-400 whitespace-nowrap" :title="formatDate(err.first_seen)" x-text="timeAgo(err.first_seen)"></td>
              <td class="px-4 py-3 text-gray-400 whitespace-nowrap" :title="formatDate(err.last_seen)" x-text="timeAgo(err.last_seen)"></td>
              <td class="px-4 py-3">
                <span class="inline-block text-xs px-2 py-0.5 rounded" :class="sourceBadge(err.source)" x-text="err.source || 'server'"></span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Error cards (mobile) -->
    <div class="md:hidden space-y-2">
      <template x-if="loading">
        <div class="px-4 py-8 text-center text-gray-500 rounded-lg border border-gray-700">Loading...</div>
      </template>
      <template x-if="!loading && errors.length === 0">
        <div class="px-4 py-8 text-center text-gray-500 rounded-lg border border-gray-700">No errors found</div>
      </template>
      <template x-for="err in errors" :key="err.id">
        <a :href="'/errors/' + err.id" class="block rounded-lg border border-gray-700 bg-gray-900/50 hover:bg-gray-800/70 transition-colors p-3">
          <div class="flex items-start justify-between gap-2">
            <span class="text-red-400 font-medium break-all" x-text="err.exception_type"></span>
            <span class="font-medium text-sm whitespace-nowrap" :class="countClass(err.count)" x-text="err.count + '×'"></span>
          </div>
          <div class="text-gray-300 text-sm mt-1 break-words" x-text="truncate(err.message, 120)"></div>
          <div class="flex flex-wrap items-center gap-2 mt-2 text-xs">
            <span class="inline-block bg-blue-900/40 text-blue-300 px-2 py-0.5 rounded" x-text="err.project"></span>
            <span class="inline-block px-2 py-0.5 rounded" :class="sourceBadge(err.source)" x-text="err.source || 'server'"></span>
            <span class="text-gray-500" x-text="'first ' + timeAgo(err.first_seen)"></span>
            <span class="text-gray-500" x-text="'last ' + timeAgo(err.last_seen)"></span>
          </div>
        </a>
      </template>
    </div>

    <!-- API Key Modal -->
    <div x-show="showApiKeyModalFlag" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-sm">
        <h2 class="text-lg font-bold text-white mb-2">API Key Required</h2>
        <p class="text-gray-400 text-sm mb-4">Enter your API key to access the Error Tracker.</p>
        <input x-model="apiKeyInput" type="password" placeholder="your-api-key"
          @keydown.enter="submitApiKey()" x-ref="apiKeyInputEl"
          class="w-full bg-gray-900 border border-gray-600 text-gray-200 text-sm rounded px-3 py-2 mb-4 focus:outline-none focus:border-blue-500">
        <button @click="submitApiKey()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded px-4 py-2 transition-colors">Connect</button>
      </div>
    </div>

    <!-- Pagination -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mt-4 text-sm text-gray-400">
      <span x-text="paginationInfo"></span>
      <div class="flex gap-2">
        <button @click="prevPage()" :disabled="offset === 0"
          class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
        <button @click="nextPage()" :disabled="offset + limit >= total"
          class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
      </div>
    </div>
  </div>

  <script>
    function errorTracker() {
      return {
        // Auth
        apiKey: localStorage.getItem('api_key') || '',
        apiKeyInput: '',
        showApiKeyModalFlag: false,

        // Filter / query state (mirrored to URL)
        project: '',
        source: '',
        resolved: false,
        refresh: '0',
        sessionId: '',
        offset: 0,
        limit: 50,

        // Server data
        errors: [],
        total: 0,
        projects: [],
        loading: true,

        // Internals
        autoRefreshTimer: null,
        suppressUrlSync: false,

        init() {
          this.readUrlState();

          this.$watch('project',  () => { this.offset = 0; this.loadErrors(); });
          this.$watch('source',   () => { this.offset = 0; this.loadErrors(); });
          this.$watch('resolved', () => { this.offset = 0; this.loadErrors(); });
          this.$watch('refresh',  () => this.setupAutoRefresh());

          window.addEventListener('popstate', () => {
            this.readUrlState();
            this.setupAutoRefresh();
            this.loadErrors();
          });

          this.setupAutoRefresh();
          if (!this.apiKey) {
            this.openApiKeyModal();
          } else {
            this.loadProjects().then(() => this.loadErrors());
          }
        },

        // ─── URL state ──────────────────────────────────────────────
        readUrlState() {
          this.suppressUrlSync = true;
          const p = new URLSearchParams(window.location.search);
          this.sessionId = p.get('session_id') || '';
          this.project   = p.get('project')    || '';
          this.source    = p.get('source')     || '';
          this.resolved  = p.get('resolved') === 'true';
          this.refresh   = p.get('refresh')    || '0';
          const off = parseInt(p.get('offset') || '0', 10);
          this.offset = isNaN(off) ? 0 : off;
          this.suppressUrlSync = false;
        },

        writeUrlState() {
          if (this.suppressUrlSync) return;
          const p = new URLSearchParams();
          if (this.sessionId) p.set('session_id', this.sessionId);
          if (this.project)   p.set('project', this.project);
          if (this.source)    p.set('source', this.source);
          if (this.resolved)  p.set('resolved', 'true');
          if (this.refresh && this.refresh !== '0') p.set('refresh', this.refresh);
          if (this.offset > 0) p.set('offset', String(this.offset));
          const qs = p.toString();
          window.history.replaceState({}, '', window.location.pathname + (qs ? '?' + qs : ''));
        },

        clearSession() {
          this.sessionId = '';
          this.offset = 0;
          this.loadErrors();
        },

        // ─── Helpers ────────────────────────────────────────────────
        headers() {
          const h = { 'Content-Type': 'application/json' };
          if (this.apiKey) h['X-API-Key'] = this.apiKey;
          return h;
        },

        truncate(s, n) {
          if (!s) return '';
          return s.length > n ? s.substring(0, n) + '...' : s;
        },

        formatDate(iso) {
          if (!iso) return '';
          const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
          return d.toLocaleString();
        },

        timeAgo(iso) {
          if (!iso) return '';
          const now = Date.now();
          const then = new Date(iso.endsWith('Z') ? iso : iso + 'Z').getTime();
          const diff = Math.floor((now - then) / 1000);
          if (diff < 60) return diff + 's ago';
          if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
          if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
          return Math.floor(diff / 86400) + 'd ago';
        },

        countClass(c) {
          if (c > 100) return 'text-red-400';
          if (c > 10) return 'text-yellow-400';
          return 'text-gray-300';
        },

        sourceBadge(src) {
          return src === 'browser'
            ? 'bg-purple-900/40 text-purple-300'
            : 'bg-gray-700/40 text-gray-300';
        },

        get paginationInfo() {
          if (this.total === 0) return 'No errors';
          const start = this.offset + 1;
          const end = Math.min(this.offset + this.limit, this.total);
          return `Showing ${start}-${end} of ${this.total}`;
        },

        // ─── Data fetching ──────────────────────────────────────────
        async loadProjects() {
          try {
            const res = await fetch('/api/projects', { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            const data = await res.json();
            this.projects = data.projects || [];
          } catch (e) {
            console.error('Failed to load projects:', e);
          }
        },

        async loadErrors() {
          this.writeUrlState();
          const params = new URLSearchParams();
          if (this.project)   params.set('project', this.project);
          if (this.source)    params.set('source', this.source);
          if (this.sessionId) params.set('session_id', this.sessionId);
          if (this.resolved)  params.set('resolved', 'true');
          params.set('limit', this.limit);
          params.set('offset', this.offset);

          this.loading = true;
          try {
            const res = await fetch('/api/errors?' + params.toString(), { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            const data = await res.json();
            this.errors = data.errors || [];
            this.total = data.total || 0;
          } catch (e) {
            console.error('Failed to load errors:', e);
            this.errors = [];
            this.total = 0;
          } finally {
            this.loading = false;
          }
        },

        prevPage() {
          this.offset = Math.max(0, this.offset - this.limit);
          this.loadErrors();
        },

        nextPage() {
          this.offset += this.limit;
          this.loadErrors();
        },

        // ─── Auto-refresh ───────────────────────────────────────────
        setupAutoRefresh() {
          this.writeUrlState();
          if (this.autoRefreshTimer) {
            clearInterval(this.autoRefreshTimer);
            this.autoRefreshTimer = null;
          }
          const seconds = parseInt(this.refresh, 10);
          if (seconds > 0) {
            this.autoRefreshTimer = setInterval(() => this.loadErrors(), seconds * 1000);
          }
        },

        // ─── API key modal ──────────────────────────────────────────
        openApiKeyModal() {
          this.showApiKeyModalFlag = true;
          this.$nextTick(() => this.$refs.apiKeyInputEl?.focus());
        },

        submitApiKey() {
          const key = (this.apiKeyInput || '').trim();
          if (!key) return;
          this.apiKey = key;
          localStorage.setItem('api_key', key);
          this.showApiKeyModalFlag = false;
          this.loadProjects().then(() => this.loadErrors());
        },
      };
    }
  </script>
</body>
</html>
