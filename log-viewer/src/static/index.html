<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Viewer</title>
  <link rel="stylesheet" href="/tailwind.css">
  <script defer src="/alpine.js"></script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .log-message { white-space: pre-wrap; word-break: break-word; }
    .log-collapsed { max-height: 1.5em; overflow: hidden; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="logViewer()" x-init="init()" x-cloak>
  <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    <header class="mb-4 sm:mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white">Log Viewer</h1>
        <p class="text-gray-400 text-xs sm:text-sm mt-1">Browse and search application logs</p>
      </div>
      <div class="text-xs text-gray-500" x-text="statsText"></div>
    </header>

    <!-- Filters -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:flex-wrap gap-3 sm:gap-4 mb-4 lg:items-end">
      <div class="sm:col-span-2 lg:flex-1 lg:min-w-[200px]">
        <label class="block text-xs text-gray-400 mb-1">Search</label>
        <input type="text" x-model="search" placeholder="Full-text search..."
          class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Container</label>
        <select x-model="container" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All containers</option>
          <template x-for="c in containers" :key="c.name">
            <option :value="c.name" x-text="c.name + ' (' + c.log_count + ')'"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Level</label>
        <select x-model="level" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All levels</option>
          <optgroup label="Exact match">
            <option value="DEBUG">DEBUG</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
            <option value="CRITICAL">CRITICAL</option>
          </optgroup>
          <optgroup label="And above">
            <option value=">=DEBUG">&ge; DEBUG</option>
            <option value=">=INFO">&ge; INFO</option>
            <option value=">=WARNING">&ge; WARNING</option>
            <option value=">=ERROR">&ge; ERROR</option>
            <!-- >=CRITICAL omitted: equivalent to exact CRITICAL match -->
          </optgroup>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Time range</label>
        <select x-model="time" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="">All time</option>
          <option value="1h">Last 1 hour</option>
          <option value="24h">Last 24 hours</option>
          <option value="7d">Last 7 days</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Auto-refresh</label>
        <select x-model="refresh" class="w-full lg:w-auto bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-3 py-1.5 focus:outline-none focus:border-blue-500">
          <option value="0">Off</option>
          <option value="5">Every 5s</option>
          <option value="30">Every 30s</option>
          <option value="60">Every 1m</option>
          <option value="300">Every 5m</option>
        </select>
      </div>
      <div class="flex gap-2 lg:items-end">
        <button @click="tailActive ? stopTail() : startTail()"
          :class="tailActive ? 'bg-green-900 border-green-700 text-green-300' : 'bg-gray-800 border-gray-700 hover:bg-gray-700'"
          class="flex-1 lg:flex-initial w-full lg:w-auto px-3 py-1.5 rounded text-sm font-medium border transition-colors">
          <span x-text="tailActive ? 'Stop Tail' : 'Live Tail'"></span>
        </button>
        <span x-show="refresh !== '0' && !tailActive" class="self-center text-green-400 text-xs whitespace-nowrap">&#9679; live</span>
      </div>
    </div>

    <!-- Live tail indicator -->
    <div x-show="tailActive" class="mb-4 flex items-center gap-2 text-sm">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
      </span>
      <span class="text-green-400">Live tail active</span>
      <span class="text-gray-500 ml-2" x-text="tailCount + ' new entries'"></span>
    </div>

    <!-- Log entries -->
    <div class="rounded-lg border border-gray-700 overflow-hidden">
      <div class="divide-y divide-gray-800 max-h-[70vh] overflow-y-auto">
        <template x-if="loading">
          <div class="px-4 py-8 text-center text-gray-500">Loading...</div>
        </template>
        <template x-if="!loading && logs.length === 0">
          <div class="px-4 py-8 text-center text-gray-500">No logs found</div>
        </template>
        <template x-for="entry in logs" :key="entry.id">
          <div :class="levelBg(entry.level)" class="px-3 sm:px-4 py-2 hover:bg-gray-800/50 cursor-pointer transition-colors"
               x-data="{ expanded: false }" @click="expanded = !expanded">
            <div class="flex flex-col sm:flex-row sm:items-start sm:gap-3">
              <div class="flex items-center gap-2 sm:gap-3 mb-1 sm:mb-0">
                <span class="text-xs text-gray-500 whitespace-nowrap sm:mt-0.5 sm:w-[140px] sm:flex-shrink-0" x-text="formatTimestamp(entry.timestamp)"></span>
                <span class="inline-block text-xs px-1.5 py-0.5 rounded sm:w-[60px] text-center sm:flex-shrink-0"
                      :class="levelBadge(entry.level)" x-text="entry.level"></span>
                <span class="text-xs text-purple-400 sm:w-[100px] sm:flex-shrink-0 truncate sm:mt-0.5" x-text="entry.container"></span>
              </div>
              <span class="log-message text-sm flex-1 break-words"
                    :class="[levelColor(entry.level), expanded ? '' : 'log-collapsed']"
                    x-text="entry.message"></span>
            </div>
            <div x-show="expanded" class="mt-2 sm:ml-[310px] text-xs text-gray-500 border-t border-gray-800 pt-2">
              <div><strong>ID:</strong> <span x-text="entry.id"></span></div>
              <div><strong>Stream:</strong> <span x-text="entry.stream"></span></div>
              <div><strong>Container:</strong> <span x-text="entry.container"></span></div>
              <div><strong>Timestamp:</strong> <span x-text="entry.timestamp"></span></div>
              <div class="mt-2"><strong>Full message:</strong></div>
              <pre class="mt-1 text-gray-400 whitespace-pre-wrap bg-gray-800 rounded p-2 max-h-[400px] overflow-auto" x-text="entry.message"></pre>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- API Key Modal -->
    <div x-show="showApiKeyModalFlag" @keydown.escape.window="showApiKeyModalFlag && false"
         class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
      <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-sm">
        <h2 class="text-lg font-bold text-white mb-2">API Key Required</h2>
        <p class="text-gray-400 text-sm mb-4">Enter your API key to access the Log Viewer.</p>
        <input x-model="apiKeyInput" type="password" placeholder="your-api-key"
          @keydown.enter="submitApiKey()" x-ref="apiKeyInputEl"
          class="w-full bg-gray-900 border border-gray-600 text-gray-200 text-sm rounded px-3 py-2 mb-4 focus:outline-none focus:border-blue-500">
        <button @click="submitApiKey()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded px-4 py-2 transition-colors">Connect</button>
      </div>
    </div>

    <!-- Pagination -->
    <div x-show="!tailActive" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mt-4 text-sm text-gray-400">
      <span x-text="paginationInfo"></span>
      <div class="flex gap-2">
        <button @click="prevPage()" :disabled="offset === 0"
          class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
        <button @click="nextPage()" :disabled="offset + limit >= total"
          class="px-3 py-1 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
      </div>
    </div>
  </div>

  <script>
    function logViewer() {
      return {
        // Auth
        apiKey: localStorage.getItem('api_key') || '',
        apiKeyInput: '',
        showApiKeyModalFlag: false,

        // Filter / query state (mirrored to URL)
        search: '',
        container: '',
        level: '',
        time: '',
        refresh: '0',
        offset: 0,
        limit: 100,

        // Results
        logs: [],
        total: 0,
        containers: [],
        statsText: '',
        loading: true,

        // Live tail
        tailActive: false,
        tailCount: 0,
        eventSource: null,

        // Internals
        autoRefreshTimer: null,
        searchTimer: null,
        suppressUrlSync: false,

        init() {
          this.readUrlState();

          // Reactive bindings → fetch + URL sync
          this.$watch('search', () => {
            // Debounce free-text search
            clearTimeout(this.searchTimer);
            this.searchTimer = setTimeout(() => { this.offset = 0; this.loadLogs(); }, 300);
          });
          this.$watch('container', () => { this.offset = 0; this.loadLogs(); });
          this.$watch('level',     () => { this.offset = 0; this.loadLogs(); });
          this.$watch('time',      () => { this.offset = 0; this.loadLogs(); });
          this.$watch('refresh',   () => this.setupAutoRefresh());

          window.addEventListener('popstate', () => {
            this.readUrlState();
            this.setupAutoRefresh();
            this.loadLogs();
          });

          this.setupAutoRefresh();
          if (!this.apiKey) {
            this.openApiKeyModal();
          } else {
            this.loadContainers().then(() => this.loadLogs());
            this.loadStats();
          }
        },

        // ─── URL state ──────────────────────────────────────────────
        readUrlState() {
          this.suppressUrlSync = true;
          const p = new URLSearchParams(window.location.search);
          this.search    = p.get('search')    || '';
          this.container = p.get('container') || '';
          this.level     = p.get('level')     || '';
          this.time      = p.get('time')      || '';
          this.refresh   = p.get('refresh')   || '0';
          const off = parseInt(p.get('offset') || '0', 10);
          this.offset = isNaN(off) ? 0 : off;
          this.suppressUrlSync = false;
        },

        writeUrlState() {
          if (this.suppressUrlSync) return;
          const p = new URLSearchParams();
          if (this.search)    p.set('search',    this.search);
          if (this.container) p.set('container', this.container);
          if (this.level)     p.set('level',     this.level);
          if (this.time)      p.set('time',      this.time);
          if (this.refresh && this.refresh !== '0') p.set('refresh', this.refresh);
          if (this.offset > 0) p.set('offset', String(this.offset));
          const qs = p.toString();
          window.history.replaceState({}, '', window.location.pathname + (qs ? '?' + qs : ''));
        },

        // ─── Headers / helpers ──────────────────────────────────────
        headers() {
          const h = { 'Content-Type': 'application/json' };
          if (this.apiKey) h['X-API-Key'] = this.apiKey;
          return h;
        },

        get sinceTimestamp() {
          if (!this.time) return null;
          const now = new Date();
          switch (this.time) {
            case '1h': now.setHours(now.getHours() - 1); break;
            case '24h': now.setDate(now.getDate() - 1); break;
            case '7d': now.setDate(now.getDate() - 7); break;
            default: return null;
          }
          return now.toISOString();
        },

        get paginationInfo() {
          if (this.total === 0) return 'No logs';
          const start = this.offset + 1;
          const end = Math.min(this.offset + this.limit, this.total);
          return `Showing ${start}-${end} of ${this.total.toLocaleString()}`;
        },

        formatTimestamp(iso) {
          if (!iso) return '';
          const d = new Date(iso);
          if (isNaN(d.getTime())) return iso;
          return d.toLocaleString();
        },

        levelColor(level) {
          switch ((level || '').toUpperCase()) {
            case 'DEBUG': return 'text-gray-500';
            case 'INFO': return 'text-blue-400';
            case 'WARNING': case 'WARN': return 'text-yellow-400';
            case 'ERROR': return 'text-red-400';
            case 'CRITICAL': case 'FATAL': return 'text-red-500 font-bold';
            default: return 'text-gray-300';
          }
        },

        levelBg(level) {
          switch ((level || '').toUpperCase()) {
            case 'DEBUG': return 'bg-gray-800';
            case 'INFO': return 'bg-gray-900';
            case 'WARNING': case 'WARN': return 'bg-yellow-900/10';
            case 'ERROR': return 'bg-red-900/10';
            case 'CRITICAL': case 'FATAL': return 'bg-red-900/20';
            default: return 'bg-gray-900';
          }
        },

        levelBadge(level) {
          switch ((level || '').toUpperCase()) {
            case 'DEBUG': return 'bg-gray-700 text-gray-400';
            case 'INFO': return 'bg-blue-900/40 text-blue-300';
            case 'WARNING': case 'WARN': return 'bg-yellow-900/40 text-yellow-300';
            case 'ERROR': return 'bg-red-900/40 text-red-300';
            case 'CRITICAL': case 'FATAL': return 'bg-red-900/60 text-red-200';
            default: return 'bg-gray-700 text-gray-400';
          }
        },

        // ─── Data fetching ──────────────────────────────────────────
        async loadContainers() {
          try {
            const res = await fetch('/api/containers', { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            const data = await res.json();
            this.containers = data.containers || [];
          } catch (e) {
            console.error('Failed to load containers:', e);
          }
        },

        async loadStats() {
          try {
            const res = await fetch('/api/stats', { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            const data = await res.json();
            this.statsText = `${data.total_logs.toLocaleString()} logs indexed`;
          } catch (e) {
            console.error('Failed to load stats:', e);
          }
        },

        async loadLogs() {
          this.writeUrlState();

          const params = new URLSearchParams();
          if (this.container) params.set('container', this.container);
          if (this.level)     params.set('level', this.level);
          if (this.search)    params.set('search', this.search);
          const since = this.sinceTimestamp;
          if (since) params.set('since', since);
          params.set('limit', this.limit);
          params.set('offset', this.offset);

          this.loading = true;
          try {
            const res = await fetch('/api/logs?' + params.toString(), { headers: this.headers() });
            if (res.status === 401) { this.openApiKeyModal(); return; }
            const data = await res.json();
            this.logs = data.logs || [];
            this.total = data.total || 0;
          } catch (e) {
            console.error('Failed to load logs:', e);
            this.logs = [];
            this.total = 0;
          } finally {
            this.loading = false;
          }
        },

        prevPage() {
          this.offset = Math.max(0, this.offset - this.limit);
          this.loadLogs();
        },

        nextPage() {
          this.offset += this.limit;
          this.loadLogs();
        },

        // ─── Auto-refresh ───────────────────────────────────────────
        setupAutoRefresh() {
          this.writeUrlState();
          if (this.autoRefreshTimer) {
            clearInterval(this.autoRefreshTimer);
            this.autoRefreshTimer = null;
          }
          // Auto-refresh is meaningless during live tail.
          const seconds = parseInt(this.refresh, 10);
          if (seconds > 0 && !this.tailActive) {
            this.autoRefreshTimer = setInterval(() => this.loadLogs(), seconds * 1000);
          }
        },

        // ─── Live tail (SSE) ────────────────────────────────────────
        startTail() {
          if (this.tailActive) return;
          const params = new URLSearchParams();
          if (this.container) params.set('container', this.container);
          if (this.level)     params.set('level', this.level);
          if (this.apiKey)    params.set('api_key', this.apiKey);
          const url = '/api/logs/tail' + (params.toString() ? '?' + params.toString() : '');
          this.eventSource = new EventSource(url);
          this.tailActive = true;
          this.tailCount = 0;
          // Suspend periodic refresh while tailing
          if (this.autoRefreshTimer) { clearInterval(this.autoRefreshTimer); this.autoRefreshTimer = null; }
          this.logs = [];

          this.eventSource.addEventListener('log', (e) => {
            try {
              const entry = JSON.parse(e.data);
              this.logs = [entry, ...this.logs].slice(0, 500);
              this.tailCount++;
            } catch (err) {
              console.error('Failed to parse SSE log event:', err);
            }
          });
          this.eventSource.addEventListener('heartbeat', () => {});
          this.eventSource.addEventListener('close', () => this.stopTail());
          this.eventSource.onerror = () => this.stopTail();
        },

        stopTail() {
          if (this.eventSource) {
            this.eventSource.close();
            this.eventSource = null;
          }
          this.tailActive = false;
          this.offset = 0;
          this.loadLogs();
          this.setupAutoRefresh();
        },

        // ─── API key modal ──────────────────────────────────────────
        openApiKeyModal() {
          this.showApiKeyModalFlag = true;
          this.$nextTick(() => this.$refs.apiKeyInputEl?.focus());
        },

        submitApiKey() {
          const key = (this.apiKeyInput || '').trim();
          if (!key) return;
          this.apiKey = key;
          localStorage.setItem('api_key', key);
          this.showApiKeyModalFlag = false;
          this.loadContainers().then(() => this.loadLogs());
          this.loadStats();
        },
      };
    }
  </script>
</body>
</html>
