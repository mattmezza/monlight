name: Zig Services CI

on:
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - error-tracker
          - log-viewer
          - metrics-collector
          - browser-relay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.service }}/.zig-cache
            ${{ matrix.service }}/zig-out
          key: zig-${{ matrix.service }}-${{ hashFiles(format('{0}/src/**', matrix.service), 'shared/**') }}
          restore-keys: |
            zig-${{ matrix.service }}-

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          API_KEY: test_key_ci_12345
          CONTAINERS: test_container
        run: zig build test
